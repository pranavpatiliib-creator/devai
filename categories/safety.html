<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore our Safety & Security Systems products - Devai Technologies">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://devaigroup.com/categories/safety.html">
    <title>Safety & Security - Devai Technologies</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="../css/owner.css">
    <link rel="stylesheet" href="../css/preloader.css">
</head>

<body class="loading product-category-page">
    <!-- Preloader -->
    <div id="preloader">
        <div class="preloader-rings">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
        </div>
        <div class="preloader-content">
            <img src="../images/devai-technologies-logo.png" alt="Devai Technologies industrial electrical solutions logo" class="preloader-logo">
            <h1 class="brand-text-loader">DEVAI <span>TECHNOLOGIES</span></h1>
        </div>
    </div>

    <!-- Main container for dynamic components -->
    <div id="header"></div>

    <div class="products-hero">
        <div class="container category-hero-shell">
            <a href="../categories/products.html" class="back-link">← Back to All Products</a>
            <h1>Safety & Security</h1>
            <p>Explore our comprehensive range of safety and security systems</p>
        </div>
    </div>

    <!-- Products Grid -->
    <section class="products-section">
        <div id="products-grid" class="products-grid">
            <!-- Products will be rendered here -->
        </div>
    </section>

    <div id="footer"></div>

    <!-- Scripts -->
    <script src="../js/products_data.js"></script>
    <script src="../js/products_grid.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const safetyProducts = productsData.filter(p =>
                p.category === 'Safety & Security Systems' ||
                p.category === 'Safety' ||
                p.category === 'Security'||
                p.category === "Safety & PPE"||
                p.category === "Safety, Testing & Measurement"

            );
            renderProductsGrid(safetyProducts, 'products-grid');
        });
    </script>
    <script src="../js/main.js"></script>
    <script src="../js/hamburger.js"></script>
    <script src="../js/preloader.js"></script>
</body>

</html>
